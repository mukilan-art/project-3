<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <link
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        font-family: "Arial", sans-serif;
        background-color: #f8f9fa;
      }
      header {
        background: #343a40;
        color: white;
        padding: 20px 0;
      }
      header h1 {
        margin: 0;
      }
      nav ul {
        list-style: none;
        padding: 0;
      }
      nav ul li {
        display: inline;
        margin: 0 15px;
      }
      nav ul li a {
        color: white;
        text-decoration: none;
      }
      .contact-form {
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        margin-top: 50px;
      }
      .contact-form h2 {
        margin-bottom: 20px;
      }
      .btn {
        background-color: #28a745;
        color: white;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container d-flex justify-content-between align-items-center">
        <h1>Contact Us</h1>
        <nav>
          <ul class="nav">
              <li class="nav-item"><a class="nav-link" href="index.html">index</a></li>
              <li class="nav-item">
                <a class="nav-link" href="http://127.0.0.1:5500/SERVICE.html">Services</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="http://127.0.0.1:5500/ABOUT.html">About Us</a>
              </li>
              <li class="nav-item"><a class="nav-link" href="http://127.0.0.1:5500/CONTACT%20US.html">Contact</a></li>
            </ul>
        </nav>
      </div>
    </header>

    <div class="container">
      <div class="contact-form">
        <h2>Get In Touch</h2>
        <form action="#" method="POST">
          <div class="form-group">
            <label for="name">Name:</label>
            <input
              type="text"
              class="form-control"
              id="name"
              name="name"
              required
            />
          </div>
          <div class="form-group">
            <label for="email">Email:</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              required
            />
          </div>
          <div class="form-group">
            <label for="message">Message:</label>
            <textarea
              class="form-control"
              id="message"
              name="message"
              rows="2"
              required
            ></textarea>
          </div>
          <button type="submit" class="btn btn-success">Send Message</button>
        </form>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  </body>
</html>
